name: contextdiet
description: Scan AI coding-agent context quality in CI
author: Tehlikeli107

inputs:
  root:
    description: Repository root to scan
    required: false
    default: "."
  threshold:
    description: Minimum score required for success
    required: false
    default: "90"
  format:
    description: Output format: text, json, sarif, or markdown
    required: false
    default: "text"
  comment:
    description: Post or update a contextdiet pull request comment
    required: false
    default: "false"

outputs:
  exit-code:
    description: contextdiet CLI exit code
  comment-action:
    description: created or updated when a pull request comment is written

runs:
  using: node20
  main: src/action.js

branding:
  icon: activity
  color: green
